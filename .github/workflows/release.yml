name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v1.0.1
#   git push --tags
# GitHub then builds the Windows .exe and publishes a Release with it attached.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  build-and-release:
    runs-on: windows-latest   # a Windows runner is needed to build a Windows .exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Safety net: refuse to release if the tag doesn't match version.py,
      # so a forgotten version bump can't ship a mislabeled build.
      - name: Verify the tag matches version.py
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $ver = (python -c "import version; print(version.__version__)").Trim()
          if ($tag -ne $ver) {
            Write-Error "Tag '$tag' does not match version.py ('$ver'). Bump __version__ in version.py before tagging."
            exit 1
          }
          Write-Host "OK - tag matches version.py: $ver"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build BudgetManager.exe
        shell: pwsh
        run: pyinstaller --noconfirm --onefile --windowed --name BudgetManager --collect-all matplotlib main.py

      - name: Publish GitHub Release with the exe
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          "dist/BudgetManager.exe"
          --title "Budget Manager ${{ github.ref_name }}"
          --generate-notes
