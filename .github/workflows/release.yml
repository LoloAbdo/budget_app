name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v1.0.1
#   git push --tags
# GitHub then builds the Windows .exe and publishes a Release with it attached.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  build-and-release:
    runs-on: windows-latest   # a Windows runner is needed to build a Windows .exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Safety net: refuse to release if the tag doesn't match version.py,
      # so a forgotten version bump can't ship a mislabeled build.
      - name: Verify the tag matches version.py
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $ver = (python -c "import version; print(version.__version__)").Trim()
          if ($tag -ne $ver) {
            Write-Error "Tag '$tag' does not match version.py ('$ver'). Bump __version__ in version.py before tagging."
            exit 1
          }
          Write-Host "OK - tag matches version.py: $ver"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # Portable single-file exe (no install needed) -> dist_portable\BudgetManager.exe
      - name: Build portable exe (one-file)
        shell: pwsh
        run: pyinstaller --noconfirm --onefile --windowed --name BudgetManager --icon assets/icon.ico --add-data "assets;assets" --collect-all matplotlib --distpath dist_portable main.py

      # One-folder build (instant startup) that the installer packages -> dist\BudgetManager\
      - name: Build app folder (one-folder, for the installer)
        shell: pwsh
        run: pyinstaller --noconfirm --onedir --windowed --name BudgetManager --icon assets/icon.ico --add-data "assets;assets" --collect-all matplotlib main.py

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build the installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $ver = (python -c "import version; print(version.__version__)").Trim()
          & $iscc "/DMyAppVersion=$ver" installer.iss

      # SHA-256 checksums for both binaries, in sha256sum format
      # ("<hex> *<filename>"). The in-app updater downloads this file and
      # refuses to run an installer whose hash doesn't match.
      - name: Generate SHA256SUMS.txt
        shell: pwsh
        run: |
          $lines = @(
            @{ Path = "installer_output/BudgetManagerSetup.exe" },
            @{ Path = "dist_portable/BudgetManager.exe" }
          ) | ForEach-Object {
            $hash = (Get-FileHash $_.Path -Algorithm SHA256).Hash.ToLower()
            $name = Split-Path $_.Path -Leaf
            "$hash *$name"
          }
          # ASCII + LF so the file parses identically everywhere.
          [IO.File]::WriteAllText("SHA256SUMS.txt", ($lines -join "`n") + "`n")
          Get-Content SHA256SUMS.txt

      # Idempotent publish: create the release if it doesn't exist yet,
      # otherwise just (re-)upload the assets with --clobber. This way a
      # pre-existing release (e.g. created manually) or a workflow re-run
      # never fails with "a release with the same tag name already exists".
      - name: Publish GitHub Release (installer + portable exe + checksums)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists - uploading assets with --clobber"
            gh release upload $tag `
              "installer_output/BudgetManagerSetup.exe" `
              "dist_portable/BudgetManager.exe" `
              "SHA256SUMS.txt" `
              --clobber
          } else {
            Write-Host "Creating release $tag"
            gh release create $tag `
              "installer_output/BudgetManagerSetup.exe" `
              "dist_portable/BudgetManager.exe" `
              "SHA256SUMS.txt" `
              --title "Budget Manager $tag" `
              --generate-notes
          }
